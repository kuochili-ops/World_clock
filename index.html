<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>白六世界時鐘分享器</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --wood: #dcc2a1; --dark: #3e2723; --bg: #0a0a0a; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; }
        .card { background: var(--dark); border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 400px; box-sizing: border-box; text-align: center; }
        h2 { color: var(--wood); margin-bottom: 25px; letter-spacing: 2px; }
        .field { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 12px; color: var(--wood); margin-bottom: 8px; font-weight: bold; }
        input { width: 100%; padding: 14px; border: 1.5px solid var(--wood); border-radius: 12px; background: #2a1b19; color: white; outline: none; box-sizing: border-box; font-size: 16px; }
        .btn-send { width: 100%; padding: 16px; background: var(--wood); color: var(--dark); border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-send:active { transform: scale(0.98); }
        #status { margin-top: 15px; font-size: 12px; color: #888; }
    </style>
</head>
<body>

<div class="card">
    <h2>白六世界時鐘</h2>
    <div class="field">
        <label>自訂問候語</label>
        <input type="text" id="greeting" value="這是一個機械感十足的世界時鐘！" placeholder="輸入想說的話...">
    </div>
    <button class="btn-send" onclick="sendFlex()">選擇好友發送</button>
    <div id="status">正在同步系統權限...</div>
</div>

<script>
    const LIFF_ID = "2009222789-jxWTouxO";
    const CLOCK_URL = "https://kuochili-ops.github.io/World_clock/index2.html";

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            document.getElementById('status').innerText = "系統已就緒";
        } catch (e) { 
            document.getElementById('status').innerText = "初始化錯誤: " + e.message;
        }
    }

    async function sendFlex() {
        const greeting = document.getElementById('greeting').value || "送給你一個精緻的世界時鐘";
        
        // 構建與成功代碼一致的 Flex 結構
        const flexMsg = [{
            "type": "flex",
            "altText": "🎥 白六送來了世界時鐘",
            "contents": {
                "type": "bubble",
                "hero": {
                    "type": "image",
                    "url": "https://images.unsplash.com/photo-1508962301584-53cd991c68e1?auto=format&fit=crop&q=80&w=1000",
                    "size": "full",
                    "aspectRatio": "16:9",
                    "aspectMode": "cover",
                    "action": { "type": "uri", "uri": CLOCK_URL }
                },
                "body": {
                    "type": "box",
                    "layout": "vertical",
                    "backgroundColor": "#3e2723",
                    "contents": [
                        { "type": "text", "text": "WORLD CLOCK", "color": "#dcc2a1", "size": "xs", "weight": "bold", "letterSpacing": "2px" },
                        { "type": "text", "text": greeting, "color": "#ffffff", "margin": "md", "wrap": true, "weight": "bold", "size": "md" }
                    ]
                },
                "footer": {
                    "type": "box",
                    "layout": "vertical",
                    "backgroundColor": "#3e2723",
                    "contents": [
                        {
                            "type": "button",
                            "style": "primary",
                            "color": "#dcc2a1",
                            "height": "sm",
                            "action": {
                                "type": "uri",
                                "label": "開啟世界時鐘",
                                "uri": CLOCK_URL
                            }
                        }
                    ]
                }
            }
        }];

        try {
            if (!liff.isInClient()) {
                alert("請在 LINE App 內操作");
                return;
            }
            
            const result = await liff.shareTargetPicker(flexMsg);
            if (result) {
                liff.closeWindow();
            }
        } catch (e) {
            alert("發送失敗，請確認後台 Scopes 勾選了 shareTargetPicker");
        }
    }

    window.onload = init;
</script>
</body>
</html>
