<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>白六 Line 世界時鐘</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --wood: #dcc2a1; --dark: #3e2723; }
        body { background: #0a0a0a; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { width: 90%; max-width: 350px; background: var(--dark); padding: 25px; border-radius: 15px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 5px; border: 1px solid var(--wood); background: #2a1b19; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--wood); color: var(--dark); border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #status { margin-top: 15px; font-size: 12px; color: #888; }
    </style>
</head>
<body>
    <div class="box">
        <h3 style="color:var(--wood)">白六世界時鐘分享</h3>
        <input type="text" id="greeting" value="看一看現在的精確時間！">
        <button id="btn" onclick="share()">點我選擇好友寄送</button>
        <div id="status">初始化中...</div>
    </div>

<script>
    const LIFF_ID = '2009222789-jxWTouxO';
    const TARGET_URL = 'https://kuochili-ops.github.io/World_clock/index2.html';

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                // 檢查是否真的具備分享權限
                if (liff.canIUse('shareTargetPicker')) {
                    document.getElementById('status').innerText = "環境檢查：通過";
                } else {
                    document.getElementById('status').innerText = "環境檢查：請至後台開啟 shareTargetPicker 權限";
                    document.getElementById('btn').style.opacity = "0.5";
                }
            }
        } catch (e) {
            document.getElementById('status').innerText = "錯誤: " + e.message;
        }
    }

    async function share() {
        const msg = document.getElementById('greeting').value;
        try {
            const res = await liff.shareTargetPicker([{
                "type": "flex",
                "altText": "白六送給你一個世界時鐘",
                "contents": {
                    "type": "bubble",
                    "backgroundColor": "#3e2723",
                    "body": {
                        "type": "box",
                        "layout": "vertical",
                        "contents": [
                            { "type": "text", "text": "WORLD CLOCK", "color": "#dcc2a1", "size": "xs", "weight": "bold" },
                            { "type": "text", "text": msg, "color": "#ffffff", "margin": "md", "wrap": true, "weight": "bold" },
                            {
                                "type": "button",
                                "action": { "type": "uri", "label": "開啟時鐘", "uri": TARGET_URL },
                                "style": "primary",
                                "color": "#dcc2a1",
                                "margin": "xl"
                            }
                        ]
                    }
                }
            }]);
            if (res) {
                liff.closeWindow();
            }
        } catch (e) {
            alert("傳送失敗: " + e.message);
        }
    }
    init();
</script>
</body>
</html>
