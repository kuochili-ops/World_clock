<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>白六世界時鐘</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --wood: #dcc2a1; --dark: #3e2723; --bg: #0a0a0a; }
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background: var(--bg); margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; }
        .card { background: var(--dark); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 400px; box-sizing: border-box; text-align: center; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; }
        h2 { color: var(--wood); margin-bottom: 20px; letter-spacing: 1px; }
        input { width: 100%; padding: 14px; border: 1.5px solid var(--wood); border-radius: 12px; background: #2a1b19; color: white; outline: none; font-size: 16px; box-sizing: border-box; margin-bottom: 20px; }
        button { width: 100%; padding: 16px; background: var(--wood); color: var(--dark); border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="loader">載入系統中...</div>

<div class="card" id="app" style="display: none;">
    <h2>白六世界時鐘</h2>
    <input type="text" id="greeting" value="看一看現在的精確時間！">
    <button onclick="send()">選擇好友發送</button>
</div>

<script>
    const LIFF_ID = "2009222789-jxWTouxO";

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            const params = new URLSearchParams(window.location.search);
            
            // 偵測到參數時，立即自動跳轉至 index2.html
            if (params.get('action') === 'play') {
                window.location.href = "index2.html";
                return;
            }

            document.getElementById('loader').style.display = 'none';
            document.getElementById('app').style.display = 'block';

            if (!liff.isLoggedIn()) { liff.login(); }
        } catch (e) {
            console.error(e);
            document.getElementById('loader').innerText = "初始化失敗";
        }
    }

    async function send() {
        const text = document.getElementById('greeting').value;
        const playLink = `https://liff.line.me/${LIFF_ID}/?action=play`;

        const flexMsg = [{
            "type": "flex",
            "altText": "⏰ 白六送來了世界時鐘",
            "contents": {
                "type": "bubble",
                "body": {
                    "type": "box",
                    "layout": "vertical",
                    "backgroundColor": "#3e2723",
                    "paddingAll": "25px",
                    "contents": [
                        { "type": "text", "text": "WORLD CLOCK", "color": "#dcc2a1", "size": "xs", "weight": "bold", "letterSpacing": "2px" },
                        { "type": "text", "text": text, "color": "#ffffff", "margin": "lg", "wrap": true, "weight": "bold", "size": "md" },
                        {
                            "type": "button",
                            "action": { "type": "uri", "label": "開啟時鐘", "uri": playLink },
                            "style": "primary",
                            "color": "#dcc2a1",
                            "margin": "xxl",
                            "height": "sm"
                        }
                    ]
                }
            }
        }];

        try {
            await liff.shareTargetPicker(flexMsg);
            liff.closeWindow();
        } catch (e) {
            alert("發送中斷，請確認 Scopes 權限");
        }
    }

    window.onload = init;
</script>
</body>
</html>
