<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>白六世界時鐘</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #3e2723; border-radius: 20px; padding: 25px; width: 85%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: 1px solid #dcc2a1; background: #2a1b19; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #dcc2a1; color: #3e2723; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="loader" style="position:fixed;">讀取中...</div>

<div class="card" id="app" style="display:none;">
    <h2 style="color:#dcc2a1;">世界時鐘分享</h2>
    <input type="text" id="greeting" value="看一看現在的精確時間！">
    <button onclick="send()">選擇好友發送</button>
</div>

<script>
    const LIFF_ID = "2009222789-jxWTouxO";

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            const params = new URLSearchParams(window.location.search);
            
            // 如果帶有 action 參數，直接跳轉 index2.html
            if (params.get('action') === 'play') {
                window.location.href = "index2.html";
                return;
            }

            document.getElementById('loader').style.display = 'none';
            document.getElementById('app').style.display = 'block';

            if (!liff.isLoggedIn()) { liff.login(); }
        } catch (e) { console.error(e); }
    }

    async function send() {
        const txt = document.getElementById('greeting').value;
        // 模仿成功案例使用帶參數的 LIFF URL
        const link = `https://liff.line.me/${LIFF_ID}/?action=play`;

        const msg = [{
            type: "flex",
            altText: "⏰ 白六世界時鐘",
            contents: {
                "type": "bubble",
                "hero": {
                    "type": "image",
                    "url": "https://images.unsplash.com/photo-1508962301584-53cd991c68e1?w=1000",
                    "size": "full", "aspectRatio": "20:13", "aspectMode": "cover",
                    "action": { "type": "uri", "uri": link }
                },
                "body": {
                    "type": "box", "layout": "vertical", "backgroundColor": "#3e2723",
                    "contents": [
                        { "type": "text", "text": txt, "color": "#ffffff", "wrap": true, "weight": "bold" }
                    ]
                },
                "footer": {
                    "type": "box", "layout": "vertical", "backgroundColor": "#3e2723",
                    "contents": [
                        { "type": "button", "action": { "type": "uri", "label": "開啟時鐘", "uri": link }, "style": "primary", "color": "#dcc2a1" }
                    ]
                }
            }
        }];

        try {
            await liff.shareTargetPicker(msg);
            liff.closeWindow();
        } catch (e) { alert("發送失敗"); }
    }
    window.onload = init;
</script>
</body>
</html>
