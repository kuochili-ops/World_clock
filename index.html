<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>白六世界時鐘分享</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --wood: #dcc2a1; --dark: #3e2723; --bg: #0a0a0a; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; }
        .card { background: var(--dark); border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 400px; box-sizing: border-box; text-align: center; }
        h2 { color: var(--wood); margin-bottom: 25px; }
        input { width: 100%; padding: 14px; border: 1.5px solid var(--wood); border-radius: 12px; background: #2a1b19; color: white; outline: none; box-sizing: border-box; font-size: 16px; margin-bottom: 20px; }
        .btn-send { width: 100%; padding: 16px; background: var(--wood); color: var(--dark); border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h2>白六世界時鐘</h2>
    <input type="text" id="greeting" value="這是一個機械感十足的世界時鐘！">
    <button class="btn-send" onclick="sendFlex()">選擇好友寄送</button>
</div>

<script>
    const LIFF_ID = "2009222789-jxWTouxO";
    // 這裡直接使用 LIFF URL 確保跳轉成功
    const LIFF_URL = `https://liff.line.me/${LIFF_ID}`;

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            }
        } catch (e) {
            console.error("Init Error", e);
        }
    }

    async function sendFlex() {
        const greeting = document.getElementById('greeting').value || "送給你一個精緻的世界時鐘";
        
        // 結構完全比照您的 YouTube 成功案例
        const flexMsg = [{
            "type": "flex",
            "altText": "🎥 白六送來了世界時鐘",
            "contents": {
                "type": "bubble",
                "hero": {
                    "type": "image",
                    "url": "https://images.unsplash.com/photo-1508962301584-53cd991c68e1?auto=format&fit=crop&q=80&w=1000",
                    "size": "full",
                    "aspectRatio": "16:9",
                    "aspectMode": "cover",
                    "action": { "type": "uri", "uri": LIFF_URL }
                },
                "body": {
                    "type": "box",
                    "layout": "vertical",
                    "backgroundColor": "#3e2723",
                    "contents": [
                        { "type": "text", "text": "WORLD CLOCK", "color": "#dcc2a1", "size": "xs", "weight": "bold", "letterSpacing": "2px" },
                        { "type": "text", "text": greeting, "color": "#ffffff", "margin": "md", "wrap": true, "weight": "bold", "size": "md" }
                    ]
                },
                "footer": {
                    "type": "box",
                    "layout": "vertical",
                    "backgroundColor": "#3e2723",
                    "contents": [
                        {
                            "type": "button",
                            "style": "primary",
                            "color": "#dcc2a1",
                            "height": "sm",
                            "action": {
                                "type": "uri",
                                "label": "開啟世界時鐘",
                                "uri": LIFF_URL
                            }
                        }
                    ]
                }
            }
        }];

        try {
            // 直接呼叫，不進行 if 檢查
            await liff.shareTargetPicker(flexMsg);
            liff.closeWindow();
        } catch (e) {
            alert("請確認 Scopes 勾選了 shareTargetPicker 並 Update");
        }
    }

    window.onload = init;
</script>
</body>
</html>
