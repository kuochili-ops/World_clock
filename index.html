<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>白六世界時鐘 - 訊息分享</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --wood: #dcc2a1; --dark: #3e2723; }
        body { background: #0a0a0a; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .box { width: 100%; max-width: 350px; background: var(--dark); padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        h2 { color: var(--wood); margin-top: 0; font-size: 1.5rem; }
        input { width: 100%; padding: 14px; margin: 20px 0; border-radius: 8px; border: 1px solid var(--wood); background: #2a1b19; color: white; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 16px; background: var(--wood); color: var(--dark); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.2s; }
        button:active { transform: scale(0.98); opacity: 0.9; }
        #status { margin-top: 20px; font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>
    <div class="box">
        <h2>白六世界時鐘</h2>
        <input type="text" id="greeting" value="這是一個機械感十足的世界時鐘！" placeholder="輸入問候語...">
        <button id="btnShare" onclick="sendShare()">點選好友寄送</button>
        <div id="status">正在同步系統權限...</div>
    </div>

<script>
    const LIFF_ID = '2009222789-jxWTouxO'; 
    const CLOCK_URL = 'https://kuochili-ops.github.io/World_clock/index2.html';

    async function initLiff() {
        const statusEl = document.getElementById('status');
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                statusEl.innerText = "權限已就緒，可開始分享";
            }
        } catch (err) {
            statusEl.innerText = "初始化失敗: " + err.message;
        }
    }

async function sendShare() {
    const greetingText = document.getElementById('greeting').value || "你好！";

    try {
        const result = await liff.shareTargetPicker([
            {
                "type": "flex",
                "altText": "白六分享了一個世界時鐘給你", // 確保這行文字足夠具體
                "contents": {
                    "type": "bubble",
                    "backgroundColor": "#3e2723",
                    "body": {
                        "type": "box",
                        "layout": "vertical",
                        "contents": [
                            { "type": "text", "text": "WORLD CLOCK", "color": "#dcc2a1", "size": "xs", "weight": "bold" },
                            { "type": "text", "text": greetingText, "color": "#ffffff", "margin": "md", "wrap": true, "weight": "bold" },
                            {
                                "type": "button",
                                "action": {
                                    "type": "uri",
                                    "label": "開啟時鐘",
                                    "uri": "https://kuochili-ops.github.io/World_clock/index2.html"
                                },
                                "style": "primary",
                                "color": "#dcc2a1",
                                "margin": "xl"
                            }
                        ]
                    }
                }
            }
        ]);

        if (result) {
            document.getElementById('status').innerText = "發送流程完成";
            liff.closeWindow();
        } else {
            document.getElementById('status').innerText = "使用者取消了分享";
        }
    } catch (error) {
        alert("發送失敗: " + error.message);
    }
}

    initLiff();
</script>
</body>
</html>
